spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: library-api
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:50MB}
      max-request-size: ${MAX_REQUEST_SIZE:50MB}
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
    driver-class-name: org.postgresql.Driver
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

logging:
  level:
    root: INFO
    com.unichristus: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) [%magenta(%X{traceId})] %msg%n"
#server:
#  error:
#    include-stacktrace: always
#    include-exception: true
#    include-message: ALWAYS
#    include-binding-errors: NEVER

minio:
  bucket:
    files: book-files
    max-size-mb: ${MINIO_MAX_SIZE_MB:50}

alerts:
  email:
    enabled: ${ALERT_EMAIL_ENABLED:false}
    from: ${ALERT_EMAIL_FROM:no-reply@library.local}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000}
  books:
    open-cache:
      ttl-days: ${OPEN_CACHE_TTL_DAYS:60}
      cleanup:
        enabled: ${OPEN_CACHE_CLEANUP_ENABLED:true}
        cron: ${OPEN_CACHE_CLEANUP_CRON:0 15 3 * * *}
  integrations:
    open-library:
      base-url: ${OPEN_LIBRARY_BASE_URL:https://openlibrary.org}
      archive-base-url: ${OPEN_LIBRARY_ARCHIVE_BASE_URL:https://archive.org}
      timeout-ms: ${OPEN_LIBRARY_TIMEOUT_MS:10000}
      max-download-bytes: ${OPEN_LIBRARY_MAX_DOWNLOAD_BYTES:52428800}
