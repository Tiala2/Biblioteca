spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

# JWT Config
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION_MILIS}

# Minio
minio:
  url: ${MINIO_URL}
  public-url: ${MINIO_PUBLIC_URL:${MINIO_URL}}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
    allowed-reset-base-urls: ${APP_FRONTEND_ALLOWED_RESET_BASE_URLS:${APP_FRONTEND_BASE_URL:http://localhost:5173}}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}

server:
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
