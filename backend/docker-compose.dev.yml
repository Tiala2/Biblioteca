services:
  api:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      library:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 35s
    restart: on-failure

  library:
    image: postgres:18-alpine
    ports:
      - "5437:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-library}
      - POSTGRES_USER=${POSTGRES_USER:-library}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-library}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-library} -d ${POSTGRES_DB:-library}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    restart: on-failure
    volumes:
      - library-data:/var/lib/postgresql/data

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: on-failure

volumes:
  library-data:
    external: true
    name: library-api-projeto_library-data
  minio-data:
    external: true
    name: library-api-projeto_minio-data
