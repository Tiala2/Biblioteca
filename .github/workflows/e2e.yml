name: E2E

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Prepare backend environment
        working-directory: backend
        run: |
          cp .env.example .env
          cat >> .env <<'EOF'
          JWT_SECRET=CI_E2E_SECRET_VALUE_WITH_ENOUGH_LENGTH
          MINIO_SECRET_KEY=CI_E2E_MINIO_SECRET
          MAIL_HOST=mailpit
          MAIL_PORT=1025
          MAIL_USERNAME=
          MAIL_PASSWORD=
          MAIL_SMTP_AUTH=false
          MAIL_SMTP_STARTTLS=false
          ALERT_EMAIL_FROM=no-reply@library.local
          LIBRARY_ADMIN_EMAIL=${{ secrets.E2E_ADMIN_EMAIL }}
          LIBRARY_ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          EOF

      - name: Create Docker volumes
        run: |
          docker volume create library-api-projeto_library-data
          docker volume create library-api-projeto_minio-data

      - name: Start backend stack
        working-directory: backend
        run: docker compose -f docker-compose.dev.yml up -d --build

      - name: Wait for backend health
        run: |
          for attempt in {1..60}; do
            if curl -fsS http://localhost:8080/actuator/health > /dev/null; then
              exit 0
            fi
            echo "Waiting for backend health ($attempt/60)..."
            sleep 5
          done
          docker compose -f backend/docker-compose.dev.yml logs api
          exit 1

      - name: Run E2E tests
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080
          FRONT_BASE_URL: http://127.0.0.1:5173
          LIBRARY_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          LIBRARY_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          if-no-files-found: ignore

      - name: Collect backend logs
        if: failure()
        working-directory: backend
        run: |
          mkdir -p logs
          docker compose -f docker-compose.dev.yml logs --no-color > logs/docker-compose.log

      - name: Upload backend logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-e2e-logs
          path: backend/logs/
          if-no-files-found: ignore

      - name: Stop backend stack
        if: always()
        working-directory: backend
        run: docker compose -f docker-compose.dev.yml down --remove-orphans
